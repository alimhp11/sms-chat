services:
  web:
    build: .
    ports:
      - "8080:8000"
    environment:
      - DB_NAME=mydatabase
      - DB_USER=myuser
      - DB_PASSWORD=mypassword
      - DB_HOST=db
      - DB_PORT=5432
    networks:
      - mynetwork
    restart: always
    depends_on:
      - db
  db:
    image: postgres:latest
    environment:
      - POSTGRES_DB=mydatabase
      - POSTGRES_USER=myuser
      - POSTGRES_PASSWORD=mypassword
    networks:
      - mynetwork
    restart: always
    volumes:
      - db_data:/var/lib/postgresql/data

    ports:
      - 5060:5432
  
networks:
  mynetwork:
    driver: bridge
    